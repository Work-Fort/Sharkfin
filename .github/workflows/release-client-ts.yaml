# SPDX-License-Identifier: AGPL-3.0-or-later
name: Release TypeScript Client

on:
  push:
    tags: ['clients/ts/v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: cd clients/ts && npm ci
      - run: cd clients/ts && npm run typecheck
      - run: cd clients/ts && npm test

  publish:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: cd clients/ts && npm ci
      - run: cd clients/ts && npm run build
      - run: cd clients/ts && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/clients/ts/}" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: clients/ts/${{ steps.version.outputs.version }}
          name: TypeScript Client ${{ steps.version.outputs.version }}
          body: |
            ## @workfort/sharkfin-client ${{ steps.version.outputs.version }}

            ```bash
            npm install @workfort/sharkfin-client@${{ steps.version.outputs.version }}
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
